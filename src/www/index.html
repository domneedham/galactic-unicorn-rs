<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Unicorn Draw</title>
</head>

<body>
    <div id="app">
        <h1>Galactic Unicorn Draw</h1>
        <div id="status">Loading...</div>
        <div id="reconnect-wrapper" style="display:none;">
            <button id="reconnectBtn">Reconnect</button>
        </div>

        <div id="main-content">
            <div id="controls">
            <div class="control-group">
                <label>Color Picker:</label>
                <input type="color" id="colorPicker" value="#ff0000">
            </div>

            <div class="control-group">
                <label>Quick Colors:</label>
                <div id="colorPalette">
                    <button class="color-swatch" data-color="#ff0000" style="background: #ff0000;" title="Red"></button>
                    <button class="color-swatch" data-color="#00ff00" style="background: #00ff00;" title="Green"></button>
                    <button class="color-swatch" data-color="#0000ff" style="background: #0000ff;" title="Blue"></button>
                    <button class="color-swatch" data-color="#ffff00" style="background: #ffff00;" title="Yellow"></button>
                    <button class="color-swatch" data-color="#ff00ff" style="background: #ff00ff;" title="Magenta"></button>
                    <button class="color-swatch" data-color="#00ffff" style="background: #00ffff;" title="Cyan"></button>
                    <button class="color-swatch" data-color="#ffffff" style="background: #ffffff;" title="White"></button>
                    <button class="color-swatch" data-color="#ff8800" style="background: #ff8800;" title="Orange"></button>
                    <button class="color-swatch" data-color="#88ff00" style="background: #88ff00;" title="Lime"></button>
                    <button class="color-swatch" data-color="#0088ff" style="background: #0088ff;" title="Sky Blue"></button>
                    <button class="color-swatch" data-color="#ff0088" style="background: #ff0088;" title="Pink"></button>
                    <button class="color-swatch" data-color="#8800ff" style="background: #8800ff;" title="Purple"></button>
                </div>
            </div>

<div class="control-group">
                <label>
                    <input type="checkbox" id="gridToggle" checked>
                    Show Pixel Grid
                </label>
            </div>

            <div class="button-group">
                <button id="clearBtn">Clear Display</button>
                <button id="fillBtn">Fill Display</button>
            </div>
            </div>

            <canvas id="canvas" width="530" height="110"></canvas>
        </div>

        <div id="info">
            <p>Display: 53x11 pixels</p>
            <p>Click or drag to draw on the canvas</p>
            <p>Hold Shift while drawing for straight lines (horizontal/vertical)</p>
        </div>
    </div>
</body>

<script>
    // Wait for all resources to fully load before initializing
    window.addEventListener('load', async () => {
        try {
            await loadCSS('index.css');
            // Small delay to ensure HTTP connection is fully closed
            await new Promise(resolve => setTimeout(resolve, 100));
            initApp();
        } catch (err) {
            console.error('Failed to load resources:', err);
            initApp();
        }
    });

    function loadCSS(href) {
        return new Promise((resolve, reject) => {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = href;
            link.onload = () => resolve();
            link.onerror = () => reject(new Error(`Failed to load CSS: ${href}`));
            document.head.appendChild(link);
        });
    }

    function initApp() {
        // Protocol constants
        const VERSION = 0x01;
        const CMD_CLEAR = 0x00;
        const CMD_SET_PIXEL = 0x01;
        const CMD_SET_PIXELS = 0x02;
        const CMD_FILL = 0x03;
        const CMD_PING = 0xFE;

        // Display dimensions
        const DISPLAY_WIDTH = 53;
        const DISPLAY_HEIGHT = 11;
        const SCALE = 10;

        // Elements
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const clearBtn = document.getElementById('clearBtn');
        const fillBtn = document.getElementById('fillBtn');
        const statusDiv = document.getElementById('status');
        const reconnectBtn = document.getElementById('reconnectBtn');
        const gridToggle = document.getElementById('gridToggle');
        const colorSwatches = document.querySelectorAll('.color-swatch');

        // State
        let ws = null;
        let isDrawing = false;
        let currentColor = { r: 255, g: 0, b: 0 };
        let pixelBuffer = [];
        let sendTimer = null;
        let isShiftPressed = false;
        let drawStartX = null;
        let drawStartY = null;
        let showGrid = true;
        let displayState = {}; // Stores all pixels currently on display

        // Keyboard events for Shift key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Shift') {
                isShiftPressed = true;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'Shift') {
                isShiftPressed = false;
            }
        });

        // Color picker
        colorPicker.addEventListener('input', () => {
            const hex = colorPicker.value;
            currentColor.r = parseInt(hex.substr(1, 2), 16);
            currentColor.g = parseInt(hex.substr(3, 2), 16);
            currentColor.b = parseInt(hex.substr(5, 2), 16);
        });

        // Color swatches
        colorSwatches.forEach(swatch => {
            swatch.addEventListener('click', () => {
                const hex = swatch.dataset.color;
                colorPicker.value = hex;
                currentColor.r = parseInt(hex.substr(1, 2), 16);
                currentColor.g = parseInt(hex.substr(3, 2), 16);
                currentColor.b = parseInt(hex.substr(5, 2), 16);

                // Visual feedback
                colorSwatches.forEach(s => s.classList.remove('selected'));
                swatch.classList.add('selected');
            });
        });

        // Grid toggle
        gridToggle.addEventListener('change', () => {
            showGrid = gridToggle.checked;
            // Redraw canvas with or without grid
            redrawCanvas();
        });

        // Draw grid overlay
        function drawGrid() {
            if (!showGrid) return;

            const scaleX = canvas.width / DISPLAY_WIDTH;
            const scaleY = canvas.height / DISPLAY_HEIGHT;

            ctx.strokeStyle = 'rgba(128, 128, 128, 0.3)';
            ctx.lineWidth = 1;

            // Vertical lines
            for (let x = 0; x <= DISPLAY_WIDTH; x++) {
                ctx.beginPath();
                ctx.moveTo(x * scaleX, 0);
                ctx.lineTo(x * scaleX, canvas.height);
                ctx.stroke();
            }

            // Horizontal lines
            for (let y = 0; y <= DISPLAY_HEIGHT; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * scaleY);
                ctx.lineTo(canvas.width, y * scaleY);
                ctx.stroke();
            }
        }

        // Initialize canvas
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawGrid(); // Draw initial grid since it's on by default

        // WebSocket connection
        let connectTimeout = null;

        function connect() {
            const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            const wsUrl = `${protocol}//${window.location.host}/draw`;

            statusDiv.textContent = 'Connecting...';
            statusDiv.className = 'connecting';
            reconnectBtn.parentElement.style.display = 'none';

            ws = new WebSocket(wsUrl);
            ws.binaryType = 'arraybuffer';

            // Timeout if connection doesn't open within 5 seconds
            connectTimeout = setTimeout(() => {
                if (ws && ws.readyState !== WebSocket.OPEN) {
                    console.warn('WebSocket connection timeout');
                    ws.close();
                    statusDiv.textContent = 'Connection timed out';
                    statusDiv.className = 'error';
                    reconnectBtn.parentElement.style.display = '';
                }
            }, 5000);

            ws.addEventListener('open', () => {
                clearTimeout(connectTimeout);
                statusDiv.textContent = 'Connected';
                statusDiv.className = 'connected';
                reconnectBtn.parentElement.style.display = 'none';
                console.log('WebSocket connected');

                // Clear both local and remote display to ensure sync
                displayState = {};
                redrawCanvas();
                sendCommand([VERSION, CMD_CLEAR]);
            });

            ws.addEventListener('close', (ev) => {
                clearTimeout(connectTimeout);
                // Clear local display on disconnect to avoid stale state
                displayState = {};
                redrawCanvas();

                // Code 1013 = Try Again Later (already in use)
                if (ev.code === 1013) {
                    statusDiv.textContent = 'Already in use by another client';
                    statusDiv.className = 'error';
                } else {
                    statusDiv.textContent = 'Disconnected';
                    statusDiv.className = 'disconnected';
                }
                reconnectBtn.parentElement.style.display = '';
                console.log('WebSocket closed:', ev.code, ev.reason);
            });

            ws.addEventListener('error', (err) => {
                clearTimeout(connectTimeout);
                statusDiv.textContent = 'Connection Error';
                statusDiv.className = 'error';
                reconnectBtn.parentElement.style.display = '';
                console.error('WebSocket error:', err);
            });
        }

        reconnectBtn.addEventListener('click', () => {
            connect();
        });

        // Send command to device
        function sendCommand(bytes) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                console.log('Sending', bytes.length, 'bytes');
                ws.send(new Uint8Array(bytes));
            } else {
                console.warn('WebSocket not ready, readyState:', ws ? ws.readyState : 'null');
            }
        }

        // Batch send pixels
        function flushPixels() {
            if (pixelBuffer.length === 0) return;

            // Send as individual SET_PIXEL commands (they batch on device)
            const bytes = [];
            for (const pixel of pixelBuffer) {
                bytes.push(VERSION, CMD_SET_PIXEL, pixel.x, pixel.y, pixel.r, pixel.g, pixel.b);
            }
            sendCommand(bytes);
            pixelBuffer = [];
        }

        // Redraw entire canvas from display state
        function redrawCanvas() {
            const scaleX = canvas.width / DISPLAY_WIDTH;
            const scaleY = canvas.height / DISPLAY_HEIGHT;

            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Redraw all pixels from state
            for (const key in displayState) {
                const pixel = displayState[key];
                ctx.fillStyle = `rgb(${pixel.r}, ${pixel.g}, ${pixel.b})`;
                ctx.fillRect(pixel.x * scaleX, pixel.y * scaleY, scaleX, scaleY);
            }

            // Draw grid on top if enabled
            if (showGrid) {
                drawGrid();
            }
        }

        // Draw pixel on canvas and queue for sending
        function drawPixel(x, y) {
            if (x < 0 || x >= DISPLAY_WIDTH || y < 0 || y >= DISPLAY_HEIGHT) {
                return;
            }

            // Store in display state
            const key = `${x},${y}`;
            displayState[key] = { x, y, r: currentColor.r, g: currentColor.g, b: currentColor.b };

            // Draw on canvas (use canvas internal size)
            const scaleX = canvas.width / DISPLAY_WIDTH;
            const scaleY = canvas.height / DISPLAY_HEIGHT;
            ctx.fillStyle = `rgb(${currentColor.r}, ${currentColor.g}, ${currentColor.b})`;
            ctx.fillRect(x * scaleX, y * scaleY, scaleX, scaleY);

            // Redraw grid on top if enabled
            if (showGrid) {
                drawGrid();
            }

            // Queue for sending
            pixelBuffer.push({ x, y, ...currentColor });

            // Debounce sending
            if (sendTimer) clearTimeout(sendTimer);
            sendTimer = setTimeout(flushPixels, 16); // ~60fps
        }

        // Constrain coordinates to straight line (horizontal or vertical)
        function constrainToStraightLine(x, y, startX, startY) {
            if (startX === null || startY === null) {
                return { x, y };
            }

            const dx = Math.abs(x - startX);
            const dy = Math.abs(y - startY);

            // Choose horizontal or vertical based on which distance is greater
            if (dx > dy) {
                // Horizontal line
                return { x, y: startY };
            } else {
                // Vertical line
                return { x: startX, y };
            }
        }

        // Canvas mouse events
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const scaleX = rect.width / DISPLAY_WIDTH;
            const scaleY = rect.height / DISPLAY_HEIGHT;
            const x = Math.floor((e.clientX - rect.left) / scaleX);
            const y = Math.floor((e.clientY - rect.top) / scaleY);

            // Store starting position for straight line drawing
            drawStartX = x;
            drawStartY = y;

            console.log('Mouse down at display coords:', x, y);
            drawPixel(x, y);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = rect.width / DISPLAY_WIDTH;
            const scaleY = rect.height / DISPLAY_HEIGHT;
            let x = Math.floor((e.clientX - rect.left) / scaleX);
            let y = Math.floor((e.clientY - rect.top) / scaleY);

            // Apply straight line constraint if Shift is pressed
            if (isShiftPressed) {
                const constrained = constrainToStraightLine(x, y, drawStartX, drawStartY);
                x = constrained.x;
                y = constrained.y;
            }

            drawPixel(x, y);
        });

        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
            drawStartX = null;
            drawStartY = null;
            flushPixels();
        });

        canvas.addEventListener('mouseleave', () => {
            if (isDrawing) {
                isDrawing = false;
                drawStartX = null;
                drawStartY = null;
                flushPixels();
            }
        });

        // Touch events for mobile
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const scaleX = rect.width / DISPLAY_WIDTH;
            const scaleY = rect.height / DISPLAY_HEIGHT;
            const touch = e.touches[0];
            const x = Math.floor((touch.clientX - rect.left) / scaleX);
            const y = Math.floor((touch.clientY - rect.top) / scaleY);

            // Store starting position for straight line drawing
            drawStartX = x;
            drawStartY = y;

            drawPixel(x, y);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = rect.width / DISPLAY_WIDTH;
            const scaleY = rect.height / DISPLAY_HEIGHT;
            const touch = e.touches[0];
            let x = Math.floor((touch.clientX - rect.left) / scaleX);
            let y = Math.floor((touch.clientY - rect.top) / scaleY);

            // Apply straight line constraint if Shift is pressed
            if (isShiftPressed) {
                const constrained = constrainToStraightLine(x, y, drawStartX, drawStartY);
                x = constrained.x;
                y = constrained.y;
            }

            drawPixel(x, y);
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isDrawing = false;
            drawStartX = null;
            drawStartY = null;
            flushPixels();
        });

        // Clear button
        clearBtn.addEventListener('click', () => {
            // Clear display state
            displayState = {};

            // Redraw canvas (will be black with optional grid)
            redrawCanvas();

            sendCommand([VERSION, CMD_CLEAR]);
        });

        // Fill button
        fillBtn.addEventListener('click', () => {
            // Fill display state
            for (let y = 0; y < DISPLAY_HEIGHT; y++) {
                for (let x = 0; x < DISPLAY_WIDTH; x++) {
                    const key = `${x},${y}`;
                    displayState[key] = { x, y, r: currentColor.r, g: currentColor.g, b: currentColor.b };
                }
            }

            // Redraw canvas
            redrawCanvas();

            sendCommand([VERSION, CMD_FILL, currentColor.r, currentColor.g, currentColor.b]);
        });

        // Start connection
        connect();

        // Ping every 30 seconds to keep connection alive
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                sendCommand([VERSION, CMD_PING]);
            }
        }, 30000);
    }
</script>

</html>
