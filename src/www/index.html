<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Unicorn Draw</title>
</head>

<body>
    <div id="app">
        <h1>Galactic Unicorn Draw</h1>
        <div id="status">Connecting...</div>

        <div id="main-content">
            <div id="controls">
            <div class="control-group">
                <label>Color:</label>
                <input type="color" id="colorPicker" value="#ff0000">
            </div>

            <div class="control-group">
                <label>Brush Size:</label>
                <input type="range" id="brushSize" min="1" max="5" value="1">
                <span id="brushSizeValue">1</span>
            </div>

            <div class="button-group">
                <button id="clearBtn">Clear Display</button>
                <button id="fillBtn">Fill Display</button>
            </div>
            </div>

            <canvas id="canvas" width="530" height="110"></canvas>
        </div>

        <div id="info">
            <p>Display: 53x11 pixels</p>
            <p>Click or drag to draw on the canvas</p>
            <p>Hold Shift while drawing for straight lines (horizontal/vertical)</p>
        </div>
    </div>
</body>

<script>
    // Load CSS after DOM
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            await loadCSS('index.css');
            initApp();
        } catch (err) {
            console.error('Failed to load resources:', err);
            initApp();
        }
    });

    function loadCSS(href) {
        return new Promise((resolve, reject) => {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = href;
            link.onload = () => resolve();
            link.onerror = () => reject(new Error(`Failed to load CSS: ${href}`));
            document.head.appendChild(link);
        });
    }

    function initApp() {
        // Protocol constants
        const VERSION = 0x01;
        const CMD_CLEAR = 0x00;
        const CMD_SET_PIXEL = 0x01;
        const CMD_SET_PIXELS = 0x02;
        const CMD_FILL = 0x03;
        const CMD_PING = 0xFE;

        // Display dimensions
        const DISPLAY_WIDTH = 53;
        const DISPLAY_HEIGHT = 11;
        const SCALE = 10;

        // Elements
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        const brushSizeValue = document.getElementById('brushSizeValue');
        const clearBtn = document.getElementById('clearBtn');
        const fillBtn = document.getElementById('fillBtn');
        const statusDiv = document.getElementById('status');

        // State
        let ws = null;
        let isDrawing = false;
        let currentColor = { r: 255, g: 0, b: 0 };
        let currentBrushSize = 1;
        let pixelBuffer = [];
        let sendTimer = null;
        let isShiftPressed = false;
        let drawStartX = null;
        let drawStartY = null;

        // Update brush size display
        brushSize.addEventListener('input', () => {
            currentBrushSize = parseInt(brushSize.value);
            brushSizeValue.textContent = currentBrushSize;
        });

        // Keyboard events for Shift key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Shift') {
                isShiftPressed = true;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'Shift') {
                isShiftPressed = false;
            }
        });

        // Color picker
        colorPicker.addEventListener('input', () => {
            const hex = colorPicker.value;
            currentColor.r = parseInt(hex.substr(1, 2), 16);
            currentColor.g = parseInt(hex.substr(3, 2), 16);
            currentColor.b = parseInt(hex.substr(5, 2), 16);
        });

        // Initialize canvas
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // WebSocket connection
        function connect() {
            const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            const wsUrl = `${protocol}//${window.location.host}/draw`;

            statusDiv.textContent = 'Connecting...';
            statusDiv.className = 'connecting';

            ws = new WebSocket(wsUrl);
            ws.binaryType = 'arraybuffer';

            ws.addEventListener('open', () => {
                statusDiv.textContent = 'Connected';
                statusDiv.className = 'connected';
                console.log('WebSocket connected');
            });

            ws.addEventListener('close', () => {
                statusDiv.textContent = 'Disconnected';
                statusDiv.className = 'disconnected';
                console.log('WebSocket closed');
                // Reconnect after 2 seconds
                setTimeout(connect, 2000);
            });

            ws.addEventListener('error', (err) => {
                statusDiv.textContent = 'Connection Error';
                statusDiv.className = 'error';
                console.error('WebSocket error:', err);
            });
        }

        // Send command to device
        function sendCommand(bytes) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                console.log('Sending', bytes.length, 'bytes');
                ws.send(new Uint8Array(bytes));
            } else {
                console.warn('WebSocket not ready, readyState:', ws ? ws.readyState : 'null');
            }
        }

        // Batch send pixels
        function flushPixels() {
            if (pixelBuffer.length === 0) return;

            // Send as individual SET_PIXEL commands (they batch on device)
            const bytes = [];
            for (const pixel of pixelBuffer) {
                bytes.push(VERSION, CMD_SET_PIXEL, pixel.x, pixel.y, pixel.r, pixel.g, pixel.b);
            }
            sendCommand(bytes);
            pixelBuffer = [];
        }

        // Draw pixel on canvas and queue for sending
        function drawPixel(x, y) {
            if (x < 0 || x >= DISPLAY_WIDTH || y < 0 || y >= DISPLAY_HEIGHT) {
                return;
            }

            // Draw on canvas (use canvas internal size)
            const scaleX = canvas.width / DISPLAY_WIDTH;
            const scaleY = canvas.height / DISPLAY_HEIGHT;
            ctx.fillStyle = `rgb(${currentColor.r}, ${currentColor.g}, ${currentColor.b})`;
            ctx.fillRect(x * scaleX, y * scaleY, scaleX, scaleY);

            // Queue for sending
            pixelBuffer.push({ x, y, ...currentColor });

            // Debounce sending
            if (sendTimer) clearTimeout(sendTimer);
            sendTimer = setTimeout(flushPixels, 16); // ~60fps
        }

        // Constrain coordinates to straight line (horizontal or vertical)
        function constrainToStraightLine(x, y, startX, startY) {
            if (startX === null || startY === null) {
                return { x, y };
            }

            const dx = Math.abs(x - startX);
            const dy = Math.abs(y - startY);

            // Choose horizontal or vertical based on which distance is greater
            if (dx > dy) {
                // Horizontal line
                return { x, y: startY };
            } else {
                // Vertical line
                return { x: startX, y };
            }
        }

        // Draw with brush
        function drawWithBrush(x, y) {
            const offset = Math.floor(currentBrushSize / 2);
            for (let dx = -offset; dx <= offset; dx++) {
                for (let dy = -offset; dy <= offset; dy++) {
                    drawPixel(x + dx, y + dy);
                }
            }
        }

        // Canvas mouse events
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const scaleX = rect.width / DISPLAY_WIDTH;
            const scaleY = rect.height / DISPLAY_HEIGHT;
            const x = Math.floor((e.clientX - rect.left) / scaleX);
            const y = Math.floor((e.clientY - rect.top) / scaleY);

            // Store starting position for straight line drawing
            drawStartX = x;
            drawStartY = y;

            console.log('Mouse down at display coords:', x, y);
            drawWithBrush(x, y);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = rect.width / DISPLAY_WIDTH;
            const scaleY = rect.height / DISPLAY_HEIGHT;
            let x = Math.floor((e.clientX - rect.left) / scaleX);
            let y = Math.floor((e.clientY - rect.top) / scaleY);

            // Apply straight line constraint if Shift is pressed
            if (isShiftPressed) {
                const constrained = constrainToStraightLine(x, y, drawStartX, drawStartY);
                x = constrained.x;
                y = constrained.y;
            }

            drawWithBrush(x, y);
        });

        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
            drawStartX = null;
            drawStartY = null;
            flushPixels();
        });

        canvas.addEventListener('mouseleave', () => {
            if (isDrawing) {
                isDrawing = false;
                drawStartX = null;
                drawStartY = null;
                flushPixels();
            }
        });

        // Touch events for mobile
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const scaleX = rect.width / DISPLAY_WIDTH;
            const scaleY = rect.height / DISPLAY_HEIGHT;
            const touch = e.touches[0];
            const x = Math.floor((touch.clientX - rect.left) / scaleX);
            const y = Math.floor((touch.clientY - rect.top) / scaleY);

            // Store starting position for straight line drawing
            drawStartX = x;
            drawStartY = y;

            drawWithBrush(x, y);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = rect.width / DISPLAY_WIDTH;
            const scaleY = rect.height / DISPLAY_HEIGHT;
            const touch = e.touches[0];
            let x = Math.floor((touch.clientX - rect.left) / scaleX);
            let y = Math.floor((touch.clientY - rect.top) / scaleY);

            // Apply straight line constraint if Shift is pressed
            if (isShiftPressed) {
                const constrained = constrainToStraightLine(x, y, drawStartX, drawStartY);
                x = constrained.x;
                y = constrained.y;
            }

            drawWithBrush(x, y);
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isDrawing = false;
            drawStartX = null;
            drawStartY = null;
            flushPixels();
        });

        // Clear button
        clearBtn.addEventListener('click', () => {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            sendCommand([VERSION, CMD_CLEAR]);
        });

        // Fill button
        fillBtn.addEventListener('click', () => {
            ctx.fillStyle = `rgb(${currentColor.r}, ${currentColor.g}, ${currentColor.b})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            sendCommand([VERSION, CMD_FILL, currentColor.r, currentColor.g, currentColor.b]);
        });

        // Start connection
        connect();

        // Ping every 30 seconds to keep connection alive
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                sendCommand([VERSION, CMD_PING]);
            }
        }, 30000);
    }
</script>

</html>
